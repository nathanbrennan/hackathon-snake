name: Validate Snake App

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f style.css
          test -f script.js

      - name: Validate JavaScript syntax
        run: node --check script.js

      - name: Serve and smoke-test app
        run: |
          python3 -m http.server 8080 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          sleep 2
          curl --fail --silent http://127.0.0.1:8080/ > /tmp/page.html
          grep -q '<canvas' /tmp/page.html

      - name: Install Playwright packages
        run: |
          npm init -y
          npm install --no-save @playwright/test@1.54.2 playwright@1.54.2

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UI interaction checks with Playwright report
        run: |
          mkdir -p .github/tests

          cat > .github/tests/ui.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');

          test('snake app basic interactions', async ({ page }) => {
            await page.goto('http://127.0.0.1:8080/', { waitUntil: 'networkidle' });

            await expect(page).toHaveTitle(/Hackathon Snake/);
            await expect(page.locator('#gameCanvas')).toBeVisible();

            await page.screenshot({ path: 'test-results/01-initial-ui.png', fullPage: true });

            await page.click('#startBtn');
            await page.waitForTimeout(250);
            await expect(page.locator('#startBtn')).toHaveText('Restart');

            await page.click('#pauseBtn');
            await expect(page.locator('#statusText')).toContainText('Paused');

            const before = await page.getAttribute('#soundBtn', 'aria-pressed');
            await page.click('#soundBtn');
            const after = await page.getAttribute('#soundBtn', 'aria-pressed');
            expect(before).not.toBe(after);

            await expect(page.locator('#speed')).toHaveText(/^\d+$/);

            await page.screenshot({ path: 'test-results/02-after-interactions.png', fullPage: true });
          });
          EOF

          python3 -m http.server 8080 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          sleep 2
          npx playwright test .github/tests/ui.spec.js --reporter=html --output=test-results

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Upload Playwright screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          if-no-files-found: warn
